# Automatický OTA deploy přes EAS Update — Doprovázení CRM Mobile
#
# Push do `main` → publikuje JS/asset update na EAS Update kanál `production`.
# Uživatelé s nainstalovanou appkou (Expo Go nebo development/production build)
# dostanou update automaticky při dalším spuštění appky — bez nutnosti
# manuálního `eas update` v terminálu a bez nového App Store/Play Store review
# (funguje jen pro JS/asset změny, ne pro nativní kód — na to by byl potřeba
# `eas build`, což je samostatný krok mimo tento MVP scaffold).

name: EAS Update

on:
  push:
    branches:
      - main

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repozitáře
        uses: actions/checkout@v4

      - name: Nastavit Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Nastavit EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Instalovat závislosti
        run: npm ci

      - name: Publikovat EAS Update
        env:
          # Commit message jde přes env proměnnou, NE přímo interpolovaná do run: příkazu —
          # kdyby obsahovala shell-speciální znaky (např. ${{ }}, zpětná lomítka, uvozovky),
          # přímá interpolace by mohla shell příkaz rozbít nebo umožnit injection.
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID }}
        run: |
          eas update --branch production --message "Auto-deploy: $COMMIT_MESSAGE" --non-interactive
